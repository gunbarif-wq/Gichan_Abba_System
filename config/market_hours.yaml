# Market Hours Configuration

# KIS 모의투자 / KRX 정규장
kis_market:
  timezone: "Asia/Seoul"
  session_name: "KRX Regular"
  pre_market:
    enabled: false
  main_market:
    start: "09:00"  # 09:00
    end: "15:30"    # 15:30
  after_market:
    enabled: false

# NXT 거래소 (추후 지원)
nxt_market:
  timezone: "Asia/Seoul"
  session_name: "NXT"
  pre_market:
    enabled: true
    start: "08:00"
    end: "08:50"
  main_market:
    start: "09:30"  # 09:30
    end: "15:20"    # 15:20
  after_market:
    enabled: true
    start: "15:40"  # 15:40
    end: "20:00"    # 20:00

# 신규 매수 제한 시간
buy_restricted_times:
  - start: "08:50"
    end: "09:30"
    reason: "프리마켓 및 오프닝 제한"
  - start: "15:20"
    end: "15:40"
    reason: "클로징 및 전환 제한"

# 주중/주말 설정
trading_days:
  monday: true
  tuesday: true
  wednesday: true
  thursday: true
  friday: true
  saturday: false
  sunday: false

# 공휴일 (YYYY-MM-DD)
